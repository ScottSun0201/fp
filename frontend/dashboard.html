
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>首页 - LWFP</title>
  <style>
    :root{--bg:#f7f9fd;--panel:#fff;--line:#d8dde6;--text:#162033;--muted:#667085;--blue:#3478ff;--soft:#edf3ff;--ok:#0f7a4f;--bad:#b42318;--warn:#b54708}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;overflow:hidden}
    .shell{height:100vh;display:grid;grid-template-columns:224px minmax(0,1fr);gap:24px;padding:24px;overflow:hidden}.side,.panel,.top{background:#fff;border:1px solid var(--line);border-radius:8px}.side{height:calc(100vh - 48px);padding:28px 24px;position:relative;overflow:hidden}.brand{font-size:28px;font-weight:850;color:#2765d8}.sub{color:var(--muted);font-size:13px;margin-top:8px}.menu-title{margin-top:42px;color:var(--muted);font-size:12px}.nav{position:relative;margin-top:14px;padding-left:28px}.nav:before{content:"";position:absolute;left:10px;top:8px;bottom:8px;border-left:2px solid var(--blue)}.nav a{display:block;height:46px;line-height:46px;color:var(--text);text-decoration:none;font-weight:700}.nav a:before{content:"";display:inline-block;width:28px;border-top:2px solid var(--blue);vertical-align:middle;margin:0 10px 0 -18px}.nav a.active{background:var(--soft);color:#2765d8;border-radius:6px;padding-left:8px}.logout{position:absolute;left:32px;right:32px;bottom:32px;height:40px;background:var(--blue);color:#fff;border-radius:6px;text-align:center;line-height:40px;text-decoration:none;font-weight:800}
    .main{min-width:0;height:calc(100vh - 48px);overflow:auto;padding-right:2px}.top{height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 32px}.top h1{font-size:22px;margin:0}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.panel{padding:24px;margin-top:24px}.panel h2{font-size:16px;margin:0 0 18px}.metric{border:1px solid var(--line);border-radius:6px;padding:16px}.metric span{font-size:12px;color:var(--muted)}.metric strong{display:block;margin-top:8px;font-size:28px}.charts{display:grid;grid-template-columns:360px 1fr;gap:24px}.bottom{display:grid;grid-template-columns:1fr 420px;gap:24px}.legend{font-size:13px;color:var(--muted);line-height:2.4}.dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:8px}.bars{height:220px;display:flex;align-items:end;gap:28px;padding:20px 30px;border-bottom:1px solid var(--line)}.bar{width:42px;background:var(--blue);border-radius:5px 5px 0 0}.bar.light{background:#e7efff}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid #e4e9f4;padding:12px 10px;text-align:left;white-space:nowrap}th{background:#f2f4f7;color:var(--muted)}.ok{color:var(--ok);font-weight:800}.bad{color:var(--bad);font-weight:800}.warn{color:var(--warn);font-weight:800}.blue{color:#2765d8;font-weight:800}
  </style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand">LWFP</div><div class="sub">协议发票对账系统</div>
    <div class="menu-title">主菜单</div>
    <nav class="nav"><a class="active" href="/">首页</a><a href="/management">对账管理</a><a href="/management?status=ERP_FAILED">异常处理</a><a href="/delivery">快递对账</a><a href="javascript:void(0)">系统设置</a><a href="javascript:void(0)">操作日志</a></nav>
    <a class="logout" href="/logout">退出</a>
  </aside>
  <main class="main">
    <section class="top"><h1>首页</h1><span class="muted">管理员 · admin</span></section>
    <section class="panel">
      <h2>经营概览</h2>
      <div class="grid">
        <div class="metric"><span>累计对账金额</span><strong id="totalAmount">0.00</strong></div>
        <div class="metric"><span>累计对账次数</span><strong id="totalCount">0</strong></div>
        <div class="metric"><span>待处理</span><strong id="pendingCount" class="warn">0</strong></div>
        <div class="metric"><span>异常数量</span><strong id="abnormalCount" class="bad">0</strong></div>
      </div>
    </section>
    <section class="charts">
      <div class="panel"><h2>状态占比</h2><svg id="pie" width="300" height="230" viewBox="0 0 300 230"></svg><div id="legend" class="legend"></div></div>
      <div class="panel"><h2>对账金额累计图</h2><svg id="lineChart" width="680" height="230" viewBox="0 0 680 230"></svg></div>
    </section>
    <section class="bottom">
      <div class="panel"><h2>对账次数累计图</h2><div id="bars" class="bars"></div></div>
      <div class="panel"><h2>待处理摘要</h2><table><tbody id="todoRows"></tbody></table></div>
    </section>
  </main>
</div>
<script>
const statusText={WAITING_INVOICE:'待上传发票',ERP_FAILED:'ERP异常',INVOICE_FAILED:'发票异常',COMPLETED:'已完成',OTHER:'其他'};
const colors={WAITING_INVOICE:'#3478ff',ERP_FAILED:'#b42318',INVOICE_FAILED:'#b54708',COMPLETED:'#0f7a4f',OTHER:'#98a2b3'};
function polar(cx,cy,r,a){const rad=(a-90)*Math.PI/180;return [cx+r*Math.cos(rad),cy+r*Math.sin(rad)]}
function arc(cx,cy,r,a0,a1,color){const p0=polar(cx,cy,r,a1),p1=polar(cx,cy,r,a0);const large=a1-a0>180?1:0;return `<path d="M${cx} ${cy} L${p1[0]} ${p1[1]} A${r} ${r} 0 ${large} 1 ${p0[0]} ${p0[1]} Z" fill="${color}"/>`}
async function load(){const r=await fetch('/api/dashboard');const d=await r.json();document.getElementById('totalAmount').textContent=d.total_amount;document.getElementById('totalCount').textContent=d.total;document.getElementById('pendingCount').textContent=d.pending;document.getElementById('abnormalCount').textContent=d.abnormal;
 const counts=d.status_counts||{};const sum=Object.values(counts).reduce((a,b)=>a+Number(b||0),0)||1;let a=0,html='';for(const k of ['WAITING_INVOICE','ERP_FAILED','INVOICE_FAILED','COMPLETED','OTHER']){const v=Number(counts[k]||0);const next=a+v/sum*360;if(v)html+=arc(115,110,82,a,next,colors[k]);a=next;}document.getElementById('pie').innerHTML=html+`<circle cx="115" cy="110" r="44" fill="#fff"/><text x="96" y="108" fill="#667085" font-size="12">总数</text><text x="100" y="134" fill="#162033" font-size="22" font-weight="800">${d.total}</text>`;
 document.getElementById('legend').innerHTML=Object.keys(colors).map(k=>`<div><i class="dot" style="background:${colors[k]}"></i>${statusText[k]} ${counts[k]||0}</div>`).join('');
 const trend=d.trend||[];const maxAmt=Math.max(...trend.map(x=>Number(x.amount||0)),1);const pts=trend.map((x,i)=>`${40+i*(600/Math.max(trend.length-1,1))},${190-Number(x.amount||0)/maxAmt*150}`).join(' ');document.getElementById('lineChart').innerHTML=`<line x1="40" y1="190" x2="640" y2="190" stroke="#d8dde6"/><polyline points="${pts}" fill="none" stroke="#3478ff" stroke-width="4"/>`;
 const maxCnt=Math.max(...trend.map(x=>Number(x.count||0)),1);document.getElementById('bars').innerHTML=trend.map((x,i)=>`<div class="bar ${i%2?'':'light'}" style="height:${30+Number(x.count||0)/maxCnt*160}px" title="${x.date} ${x.count}"></div>`).join('');
 document.getElementById('todoRows').innerHTML=['WAITING_INVOICE','ERP_FAILED','INVOICE_FAILED'].map(k=>`<tr><td class="${k==='WAITING_INVOICE'?'blue':k==='ERP_FAILED'?'bad':'warn'}">${statusText[k]}</td><td>${counts[k]||0}</td><td><a href="/management?status=${k}">进入处理</a></td></tr>`).join('');}
load();
</script>
</body></html>
