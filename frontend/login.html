
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - LWFP</title>
  <style>
    :root { --blue:#3478ff; --line:#d7e3ff; --text:#162033; --muted:#667085; --bg:#f7f9fd; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; color:var(--text); }
    .login { width:min(920px, calc(100vw - 32px)); min-height:520px; display:grid; grid-template-columns:1.1fr 360px; background:#fff; border:1px solid #d8dde6; border-radius:8px; overflow:hidden; box-shadow:0 18px 42px rgba(16,24,40,.08); }
    .visual { position:relative; padding:46px; border-right:1px solid #e4e9f4; }
    .title { font-size:28px; font-weight:800; margin:0 0 8px; }
    .sub { color:var(--muted); margin:0; }
    .map { margin-top:52px; position:relative; padding-left:92px; }
    .root { position:absolute; left:0; top:95px; background:var(--blue); color:#fff; font-weight:800; padding:12px 18px; border-radius:6px; }
    .trunk { position:absolute; left:70px; top:24px; bottom:24px; width:2px; background:var(--blue); }
    .node { position:relative; height:68px; display:flex; align-items:center; gap:14px; font-weight:700; }
    .node:before { content:""; width:54px; height:2px; background:var(--blue); margin-left:-22px; }
    .node span { color:#344054; }
    form { padding:46px 34px; display:flex; flex-direction:column; justify-content:center; }
    label { display:block; font-size:13px; font-weight:700; margin:14px 0 6px; }
    input { width:100%; height:42px; border:1px solid #aeb8c8; border-radius:6px; padding:0 12px; font-size:15px; }
    button { margin-top:20px; height:42px; border:0; border-radius:6px; background:var(--blue); color:#fff; font-weight:750; cursor:pointer; }
    .err { min-height:22px; color:#b42318; font-size:13px; margin-top:12px; }
    .hint { margin-top:18px; color:var(--muted); font-size:12px; line-height:1.6; }
    @media (max-width:800px){ .login{grid-template-columns:1fr;} .visual{display:none;} }
  </style>
</head>
<body>
  <div class="login">
    <section class="visual">
      <h1 class="title">LWFP 协议发票对账</h1>
      <p class="sub">对账单 ERP 核对 · 发票后置校验 · 异常闭环</p>
      <div class="map">
        <div class="root">内部管理系统</div>
        <div class="trunk"></div>
        <div class="node"><span>对账工作台</span></div>
        <div class="node"><span>ERP 异常处理</span></div>
        <div class="node"><span>发票校验</span></div>
        <div class="node"><span>文件留存</span></div>
      </div>
    </section>
    <form method="post">
      <h2>登录</h2>
      <label for="username">账号</label>
      <input id="username" name="username" autocomplete="username" autofocus>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password">
      <button type="submit">登录</button>
      <div class="err"></div>
      <div class="hint">默认管理员账号：admin / admin123。首次上线后请尽快修改密码。</div>
    </form>
  </div>
</body>
</html>
